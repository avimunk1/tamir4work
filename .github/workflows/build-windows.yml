name: Build Windows Exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build exe
        run: uv run pyinstaller --clean --noconfirm TochniotLeMosad_win.spec

      - uses: actions/upload-artifact@v4
        with:
          name: TochniotLeMosad-windows
          path: dist/TochniotLeMosad.exe
